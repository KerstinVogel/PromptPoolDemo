document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3ea799b3-cbe1-451d-b89b-9ff87c834736\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: italic;\n  font-weight: 400 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"2a38e020-0c05-472f-b791-ffe2cb190335\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: italic;\n  font-weight: 400 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"bef75340-26f7-4ef4-93b0-7a80742c49f7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: normal;\n  font-weight: 400 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"6615550e-eb51-4515-8c78-75f0b096e4a5\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Sans';\n  font-style: normal;\n  font-weight: 400 700;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"cc7c6205-f1f7-425c-8ed2-bca2b838dcb8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2 xt: 'Nutze ich täglich. Der Hinweis, keine Paragraphen zu erfinden, ist Gold wert.' },\n        ],\n      },\n      {\n        id: 3, title: 'Quizfragen aus dem Vorlesungsskript generieren', cat: 'material',\n        tags: ['Quiz', 'Aktivierung', 'Selbsttest'],\n        goal: 'Erzeugt aus einem Skript-Abschnitt Multiple-Choice-Fragen mit Distraktoren und Lösungserklärungen für Selbsttests.',\n        text: 'Erstelle aus dem folgenden Skript-Abschnitt 5 Multiple-Choice-Fragen für einen Selbsttest. Pro Frage:\\n- 1 korrekte Antwort und 3 plausible Distraktoren\\n- eine kurze Erklärung, warum die richtige Antwort korrekt ist\\n- Schwierigkeitsgrad von leicht bis anspruchsvoll steigend\\n\\nZielgruppe: Bachelor-Studierende im [X]. Semester.\\n\\nSkript-Abschnitt: [TEXT EINFÜGEN]',\n        tool: 'Claude', author: 'Prof. Dr. Sofia Marino', dept: 'Gesundheit & Soziales',\n        example: 'Frage 1 (leicht): Welche Aussage beschreibt den Begriff „Salutogenese“ am treffendsten?\\nA) Die Lehre von der Krankheitsentstehung\\nB) Die Frage, wie Gesundheit entsteht und erhalten bleibt ✓\\nC) …',\n        hints: 'Distraktoren stichprobenartig fachlich prüfen. Funktioniert am besten mit Abschnitten von 500–1500 Wörtern.',\n        ratingSum: 72, ratingCount: 15, createdAt: '2026-04-02',\n        comments: [\n          { name: 'Dr. Julia Brandt', dept: 'Design & Medien', date: '2026-05-02', text: 'Die gestaffelten Schwierigkeitsgrade sind ein cleverer Kniff – übernehme ich für meine Moodle-Selbsttests.' },\n        ],\n      },\n    ];\n  }\n\n  getLang() { return this.state.lang ?? (this.props.defaultLang ?? 'de'); }\n  getPrompts() { if (!this.state.prompts) this.state.prompts = this.seed(); return this.state.prompts; }\n\n  catLabel(key, lang) { const c = this.CATS.find((x) => x.key === key); return c ? c[lang] : key; }\n  avg(p) { return p.ratingCount ? p.ratingSum / p.ratingCount : 0; }\n  stars(a) { const n = Math.round(a); return { full: '★★★★★'.slice(0, n), empty: '★★★★★'.slice(n) }; }\n  fmtDate(iso, lang) {\n    const d = new Date(iso + 'T00:00:00');\n    if (lang === 'de') return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });\n    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });\n  }\n  countText(p, t) {\n    if (!p.ratingCount) return t.noRatings;\n    return p.ratingCount + ' ' + (p.ratingCount === 1 ? t.ratingWord : t.ratingsWord);\n  }\n  showToast(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._toastTimer);\n    this._toastTimer = setTimeout(() => this.setState({ toast: null }), 2600);\n  }\n  go(screen) { this.setState({ screen, formError: false }); window.scrollTo(0, 0); }\n\n  openPrompt(id) {\n    this.setState({ screen: 'detail', selectedId: id, expandedExample: false, showTranslated: false, myRating: 0, commentText: '', copied: false });\n    window.scrollTo(0, 0);\n  }\n\n  async toggleTranslate() {\n    const p = this.getPrompts().find((x) => x.id === this.state.selectedId);\n    if (!p || this.state.translating) return;\n    if (this.state.showTranslated) { this.setState({ showTranslated: false }); return; }\n    if (this.state.translations[p.id]) { this.setState({ showTranslated: true }); return; }\n    const t = this.T[this.getLang()];\n    // Offline-/Standalone-Fallback: Claude-API ist außerhalb dieser Umgebung nicht verfügbar.\n    const hasApi = typeof window !== 'undefined' && window.claude && typeof window.claude.complete === 'function';\n    if (!hasApi) {\n      if (this.FALLBACK_TR[p.id]) {\n        this.setState({ translations: { ...this.state.translations, [p.id]: this.FALLBACK_TR[p.id] }, showTranslated: true });\n      } else {\n        this.showToast(t.translateOffline);\n      }\n      return;\n    }\n    this.setState({ translating: true });\n    try {\n      const res = await window.claude.complete({\n        model: 'claude-sonnet-4-6', max_tokens: 2000,\n        messages: [{ role: 'user', content: 'Translate the following AI prompt from German into English, using British English spelling and phrasing. Preserve the line breaks, numbering and any placeholders in square brackets exactly. Return only the translated prompt text, with no preamble or explanation.\\n\\n' + p.text }],\n      });\n      this.setState({ translations: { ...this.state.translations, [p.id]: res.trim() }, showTranslated: true, translating: false });\n    } catch (e) {\n      this.setState({ translating: false });\n      this.showToast(t.translateError);\n    }\n  }\n\n  copyPrompt() {\n    const p = this.getPrompts().find((x) => x.id === this.state.selectedId);\n    if (!p) return;\n    const text = this.state.showTranslated ? (this.state.translations[p.id] || p.text) : p.text;\n    try { navigator.clipboard.writeText(text); } catch (e) { /* noop */ }\n    this.setState({ copied: true });\n    clearTimeout(this._copyTimer);\n    this._copyTimer = setTimeout(() => this.setState({ copied: false }), 1600);\n  }\n\n  submitFeedback() {\n    const t = this.T[this.getLang()];\n    const p = this.getPrompts().find((x) => x.id === this.state.selectedId);\n    if (!p) return;\n    const rating = this.state.myRating;\n    const text = this.state.commentText.trim();\n    if (!rating && !text) { this.showToast(t.feedbackEmpty); return; }\n    const prompts = this.getPrompts().map((x) => {\n      if (x.id !== p.id) return x;\n      const nx = { ...x, comments: [...x.comments] };\n      if (rating) { nx.ratingSum += rating; nx.ratingCount += 1; }\n      if (text) nx.comments.unshift({ name: this.USER.name, dept: this.USER.dept, date: '2026-07-02', text });\n      return nx;\n    });\n    this.setState({ prompts, myRating: 0, commentText: '' });\n    this.showToast(t.feedbackThanks);\n  }\n\n  publish() {\n    const t = this.T[this.getLang()];\n    const f = this.state.form;\n    if (!f.title.trim() || !f.cat || !f.text.trim()) { this.setState({ formError: true }); return; }\n    const p = {\n      id: Date.now(), title: f.title.trim(), cat: f.cat,\n      tags: f.tags.split(',').map((s) => s.trim()).filter(Boolean),\n      goal: f.goal.trim(), text: f.text, tool: f.tool,\n      author: this.USER.name, dept: this.USER.dept,\n      example: f.example.trim(), hints: f.hints.trim(),\n      ratingSum: 0, ratingCount: 0, createdAt: '2026-07-02', comments: [],\n    };\n    this.setState({\n      prompts: [p, ...this.getPrompts()],\n      form: { title: '', cat: '', tags: '', goal: '', text: '', tool: 'Claude', example: '', hints: '' },\n      formError: false, screen: 'catalog', sort: 'new', filterCat: null, search: '',\n    });\n    window.scrollTo(0, 0);\n    this.showToast(t.published);\n  }\n\n  setForm(field, value) { this.setState({ form: { ...this.state.form, [field]: value }, formError: false }); }\n\n  renderVals() {\n    const lang = this.getLang();\n    const t = this.T[lang];\n    const s = this.state;\n    const prompts = this.getPrompts();\n    const sort = s.sort ?? (this.props.defaultSort ?? 'top');\n\n    const navBase = 'background:none;border:none;cursor:pointer;font-size:14.5px;padding:8px 10px;border-radius:7px;';\n    const navStyle = (active) => navBase + (active ? 'font-weight:700;color:#1A1A1A;background:#F2F2F2' : 'font-weight:500;color:#7A7A7A');\n    const langStyle = (active) => 'border:none;cursor:pointer;font-size:12.5px;font-weight:700;padding:7px 11px;' + (active ? 'background:#1A1A1A;color:#fff' : 'background:#fff;color:#9A9A9A');\n    const chipStyle = (active) => 'border-radius:100px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;' + (active ? 'background:#E6007E;color:#fff;border:1px solid #E6007E' : 'background:#fff;color:#4A4A4A;border:1px solid #E4E4E4');\n\n    // catalog\n    const q = s.search.trim().toLowerCase();\n    let list = prompts.filter((p) => {\n      if (s.filterCat && p.cat !== s.filterCat) return false;\n      if (!q) return true;\n      const hay = [p.title, p.goal, p.author, p.dept, this.catLabel(p.cat, lang), ...p.tags].join(' ').toLowerCase();\n      return hay.includes(q);\n    });\n    list = [...list].sort((a, b) => sort === 'new'\n      ? b.createdAt.localeCompare(a.createdAt) || b.id - a.id\n      : this.avg(b) - this.avg(a) || b.ratingCount - a.ratingCount);\n\n    const toCard = (p) => {\n      const a = this.avg(p); const st = this.stars(a);\n      return {\n        id: p.id, title: p.title, catLabel: this.catLabel(p.cat, lang), goal: p.goal,\n        starFull: st.full, starEmpty: st.empty,\n        avgText: p.ratingCount ? a.toFixed(1) : '–',\n        countText: '(' + this.countText(p, t) + ')',\n        isNew: p.ratingCount === 0,\n        author: p.author + ' · ' + p.dept,\n        onOpen: () => this.openPrompt(p.id),\n      };\n    };\n\n    const chips = [\n      { label: t.allChip, style: chipStyle(!s.filterCat), onClick: () => this.setState({ filterCat: null }) },\n      ...this.CATS.map((c) => ({ label: c[lang], style: chipStyle(s.filterCat === c.key), onClick: () => this.setState({ filterCat: s.filterCat === c.key ? null : c.key }) })),\n    ];\n\n    // detail\n    const p = prompts.find((x) => x.id === s.selectedId);\n    let d = null, displayPromptText = '', translateLabel = '', exampleToggleLabel = '', detailComments = [];\n    if (p) {\n      const a = this.avg(p); const st = this.stars(a);\n      d = {\n        title: p.title, catLabel: this.catLabel(p.cat, lang), tags: p.tags, goal: p.goal,\n        tool: p.tool, author: p.author + ' · ' + p.dept, hints: p.hints,\n        example: p.example, hasExample: !!p.example,\n        starFull: st.full, starEmpty: st.empty,\n        avgText: p.ratingCount ? a.toFixed(1) : '–',\n        countText: '(' + this.countText(p, t) + ')',\n      };\n      displayPromptText = s.showTranslated ? (s.translations[p.id] || p.text) : p.text;\n      translateLabel = s.translating ? t.translating : (s.showTranslated ? t.translateDe : t.translateEn);\n      exampleToggleLabel = s.expandedExample ? t.hideExample : t.showExample;\n      detailComments = p.comments.map((c) => ({ name: c.name, dept: c.dept, date: this.fmtDate(c.date, lang), text: c.text }));\n    }\n\n    const ratingStars = [1, 2, 3, 4, 5].map((n) => ({\n      onClick: () => this.setState({ myRating: n }),\n      style: 'background:none;border:none;cursor:pointer;font-size:30px;line-height:1;padding:2px;' + (n <= s.myRating ? 'color:#E6007E' : 'color:#D8D8D8'),\n    }));\n\n    // leaderboard\n    const rated = [...prompts].sort((a, b) => this.avg(b) - this.avg(a) || b.ratingCount - a.ratingCount);\n    const toRow = (p2, i) => {\n      const a = this.avg(p2); const st = this.stars(a);\n      return {\n        rank: String(i + 1), title: p2.title, catLabel: this.catLabel(p2.cat, lang),\n        starFull: st.full, starEmpty: st.empty,\n        avgText: p2.ratingCount ? a.toFixed(1) : '–',\n        countText: this.countText(p2, t),\n        rankStyle: 'flex:none;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;' + (i === 0 ? 'background:#E6007E;color:#fff' : 'background:#F2F2F2;color:#7A7A7A'),\n        onOpen: () => this.openPrompt(p2.id),\n      };\n    };\n    const lbOverall = rated.filter((x) => x.ratingCount > 0).slice(0, 5).map(toRow);\n    const lbCats = this.CATS.map((c) => {\n      const items = rated.filter((x) => x.cat === c.key && x.ratingCount > 0).map(toRow);\n      const total = prompts.filter((x) => x.cat === c.key).length;\n      return {\n        key: c.key, label: c[lang], open: !!s.openCats[c.key],\n        chevron: s.openCats[c.key] ? '▾' : '▸',\n        countText: total + ' ' + (total === 1 ? t.resultWord : t.resultsWord),\n        empty: items.length === 0,\n        items,\n        toggle: () => this.setState({ openCats: { ...s.openCats, [c.key]: !s.openCats[c.key] } }),\n      };\n    });\n\n    return {\n      t, lang, sort,\n      isCatalog: s.screen === 'catalog', isDetail: s.screen === 'detail',\n      isShare: s.screen === 'share', isLeaderboard: s.screen === 'leaderboard',\n      goCatalog: () => this.go('catalog'), goLeaderboard: () => this.go('leaderboard'), goShare: () => this.go('share'),\n      navCatalogStyle: navStyle(s.screen === 'catalog' || s.screen === 'detail'),\n      navLbStyle: navStyle(s.screen === 'leaderboard'),\n      setDe: () => this.setState({ lang: 'de' }), setEn: () => this.setState({ lang: 'en' }),\n      langDeStyle: langStyle(lang === 'de'), langEnStyle: langStyle(lang === 'en'),\n\n      search: s.search, onSearch: (e) => this.setState({ search: e.target.value }),\n      onSort: (e) => this.setState({ sort: e.target.value }),\n      chips, cards: list.map(toCard), noResults: list.length === 0,\n      resultsText: list.length + ' ' + (list.length === 1 ? t.resultWord : t.resultsWord),\n\n      d, displayPromptText, translateLabel, exampleToggleLabel, detailComments,\n      noComments: !!p && detailComments.length === 0,\n      commentsHeading: t.commentsHeading + (p ? ' (' + detailComments.length + ')' : ''),\n      translating: s.translating, showTranslatedNote: s.showTranslated && !s.translating,\n      expandedExample: s.expandedExample, toggleExample: () => this.setState({ expandedExample: !s.expandedExample }),\n      toggleTranslate: () => this.toggleTranslate(),\n      copyPrompt: () => this.copyPrompt(), copyLabel: s.copied ? t.copied : t.copy,\n      ratingStars, commentText: s.commentText,\n      onCommentText: (e) => this.setState({ commentText: e.target.value }),\n      submitFeedback: () => this.submitFeedback(),\n\n      form: s.form, formError: s.formError,\n      catOptions: this.CATS.map((c) => ({ key: c.key, label: c[lang] })),\n      toolOptions: this.TOOLS,\n      onFormTitle: (e) => this.setForm('title', e.target.value),\n      onFormCat: (e) => this.setForm('cat', e.target.value),\n      onFormTool: (e) => this.setForm('tool', e.target.value),\n      onFormTags: (e) => this.setForm('tags', e.target.value),\n      onFormGoal: (e) => this.setForm('goal', e.target.value),\n      onFormText: (e) => this.setForm('text', e.target.value),\n      onFormExample: (e) => this.setForm('example', e.target.value),\n      onFormHints: (e) => this.setForm('hints', e.target.value),\n      publish: () => this.publish(),\n\n      lbOverall, lbCats,\n      toast: s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
